<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok AI Streamer Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="click-to-start" onclick="unlockAudio()" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;cursor:pointer;background:rgba(0,0,0,0.85);color:#fff;font-family:sans-serif;font-size:24px;text-align:center">
        <div>
            <div style="font-size:48px;margin-bottom:16px">🎤</div>
            <div>Click para iniciar audio</div>
            <div style="font-size:14px;color:#888;margin-top:8px">(Requerido por el navegador)</div>
        </div>
    </div>
    <div id="container">
        <div id="alerts"></div>
        <div id="messages"></div>
        <div id="tts-text"></div>
        <div id="emoji-layer"></div>
    </div>
    <div id="status-bar" style="position:fixed;bottom:0;left:0;right:0;min-height:24px;display:flex;align-items:center;gap:12px;padding:2px 10px;font-family:monospace;font-size:11px;color:#0f0;background:rgba(0,0,0,0.75);z-index:99998;flex-wrap:wrap">
        <span id="sse-status">SSE: ...</span>
        <span id="audio-status">AUDIO: ...</span>
        <span id="queue-status">COLA: 0</span>
        <span id="last-event">LAST: -</span>
    </div>
    <script src="overlay.js"></script>
</body>
</html>
