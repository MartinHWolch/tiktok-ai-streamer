<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - TikTok AI Streamer</title>
    <link rel="stylesheet" href="panel.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>TikTok AI Streamer</h1>
            <p>Panel de Control</p>
        </header>
        
        <section class="toggles">
            <div class="toggle-row">
                <span>TTS</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-tts">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>IA</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-ai">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>TikTok</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-tiktok">
                    <span class="slider"></span>
                </label>
            </div>
        </section>
        
        <section class="actions">
            <button id="btn-gift">Simular Regalo</button>
            <button id="btn-message">Enviar Mensaje de Prueba</button>
        </section>
        
        <section class="status">
            <div class="card">
                <h3>Estado TTS</h3>
                <span id="tts-status" class="badge off">DESACTIVADO</span>
            </div>
            <div class="card">
                <h3>Estado IA</h3>
                <span id="ai-status" class="badge off">DESACTIVADO</span>
            </div>
            <div class="card">
                <h3>Modo TikTok</h3>
                <span id="tiktok-status" class="badge off">PAUSADO</span>
            </div>
        </section>

        <section class="tts-config">
            <h2>Configuracion TTS</h2>
            <div class="config-grid">
                <div class="form-group">
                    <label for="tts-engine">Motor TTS</label>
                    <select id="tts-engine">
                        <option value="kokoro">Kokoro (ONNX)</option>
                        <option value="piper">Piper</option>
                        <option value="gtts">gTTS</option>
                    </select>
                </div>

                <!-- Solo Kokoro: selector de voz con preview -->
                <div class="form-group kokoro-opt">
                    <label for="tts-voice">Voz</label>
                    <div class="row-with-btn">
                        <select id="tts-voice">
                            <option value="">Cargando voces...</option>
                        </select>
                        <button id="btn-preview-voice" class="btn-sm" title="Escuchar esta voz">&#9654;</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tts-lang">Idioma</label>
                    <select id="tts-lang">
                        <option value="es">Espanol</option>
                        <option value="en-us">English (US)</option>
                        <option value="en-gb">English (UK)</option>
                        <option value="fr">Francais</option>
                        <option value="pt">Portugues</option>
                        <option value="it">Italiano</option>
                        <option value="de">Deutsch</option>
                        <option value="ja">日本語</option>
                        <option value="zh">中文</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>

                <!-- Solo Kokoro: mezcla de voces -->
                <div class="form-group full-width kokoro-opt">
                    <div class="blend-header">
                        <label class="switch-small">
                            <input type="checkbox" id="toggle-blend">
                            <span class="slider-small"></span>
                        </label>
                        <span>Usar mezcla de voces (Voice Blend)</span>
                    </div>
                    <input type="text" id="tts-blend" placeholder="jf_tebukuro*0.8 + ef_dora*0.2" disabled>
                    <small>Formula: voz1*0.5 + voz2*0.5</small>
                </div>

                <div class="form-group full-width kokoro-opt">
                    <label for="tts-speed">Velocidad: <span id="speed-value">1.0</span>x</label>
                    <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <div class="form-group full-width kokoro-opt">
                    <label for="tts-pitch">Tono (pitch): <span id="pitch-value">0</span> semitonos</label>
                    <input type="range" id="tts-pitch" min="-12" max="12" step="1" value="0">
                </div>

                <div class="form-group full-width kokoro-opt">
                    <label for="tts-volume">Volumen: <span id="volume-value">1.0</span>x</label>
                    <input type="range" id="tts-volume" min="0.1" max="3.0" step="0.1" value="1.0">
                </div>

                <div class="form-group kokoro-opt">
                    <label for="kokoro-model">Modelo Kokoro</label>
                    <select id="kokoro-model">
                        <option value="fp16">FP16 (177 MB - rapido)</option>
                        <option value="fp32">FP32 (305 MB - calidad)</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="tts-test-text">Texto de prueba</label>
                    <textarea id="tts-test-text" rows="2">Buenos dias, este es una prueba de sonidos</textarea>
                </div>

                <div class="form-group full-width">
                    <button id="btn-test-tts" class="btn-secondary">Probar TTS</button>
                </div>
            </div>
        </section>

        <section class="presets-config">
            <h2>Presets de Voz</h2>
            <div class="preset-row">
                <input type="text" id="preset-name" placeholder="Nombre del preset..." class="preset-input">
                <button id="btn-save-preset" class="btn-sm">Guardar</button>
            </div>
            <div class="preset-row">
                <select id="preset-select">
                    <option value="">-- Cargar preset --</option>
                </select>
                <button id="btn-load-preset" class="btn-sm">Cargar</button>
                <button id="btn-delete-preset" class="btn-sm btn-danger">Eliminar</button>
            </div>
        </section>
        
        <section class="logs">
            <h2>Ultimos Eventos</h2>
            <ul id="log-list"></ul>
        </section>
    </div>
    <script src="panel.js"></script>
</body>
</html>
